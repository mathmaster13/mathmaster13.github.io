    <script>
      // create web audio api context
const audioCtx = new(window.AudioContext || window.webkitAudioContext)();
// create Oscillator node
const oscillator = audioCtx.createOscillator();

addEventListener("keydown", (event) => {
    switch (event.key) {
        case "ArrowLeft":
            decIndex();
            break;
        case "ArrowRight":
            incIndex();
            break;
        case "n":
        case "N":
            array = ntsc;
            oscillator.start();
            break;
        case "p":
        case "P":
            array = pal;
            oscillator.start();
            break;
      case "s":
      case "S":
        oscillator.stop();
        break;
    }
});

oscillator.type = 'square';
oscillator.frequency.value = 220; // value in hertz
oscillator.connect(audioCtx.destination);

var index = 0;
var array = ntsc;

function incIndex() {
    if (index >= array.length - 1) {
        index =  array.length - 1;
    } else index++;
    playPeriod(array[index]);
}

function decIndex() {
    if (index <= 0) {
        index = 0;
    } else index--;
    playPeriod(array[index]);
}

function playPeriod(period) {
    oscillator.frequency.value = 1789773 / (16 * (period + 1));
}
