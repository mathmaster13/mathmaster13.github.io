<body>
<div class="container-lg px-3 my-5 markdown-body">

    <h1>Create a TetrisGYM highscore save</h1>

  <div id="pack1"></div>
  <div id="pack2"></div>
  <div id="pack3"></div>

    <input type="button" id="save" name="save" onchange="onSubmit()">Save Highscores</input>

    <div id="errors"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/anchor-js/4.1.0/anchor.min.js" integrity="sha256-lZaRhKri35AyJSypXXs4o6OPFTbTmUoltBbDCbdzegg=" crossorigin="anonymous"></script>
<script>anchors.add();</script>
<script src="highscore.js"></script>
<script src="BinFile.js"></script>
<script>
    "use strict";
  const packs = new Array(3);

  for (const i of [1, 2, 3]) {
    document.getElementById(`pack${i}`).innerHTML = `<input type="text" placeholder="Name #${i}" oninput="validateName(this)" id="name${i}">
    <input type="number" placeholder="Highscore #${i}" min="0" step="1" max="99999999" oninput="validateNumber(this, 8)" id="score${i}">
    <input type="number" placeholder="Line count #${i}" min="0" step="1" max="999" oninput="validateNumber(this, 3)" id="lines${i}">
    <input type="number" placeholder="Starting level #${i}" min="0" step="1" max="255" oninput="validateNumberSize(this)" id="start${i}">
    <input type="number" placeholder="Ending level #${i}" min="0" step="1" max="255" oninput="validateNumberSize(this)" id="end${i}">`;

      packs[i - 1] = {
          name: document.getElementById(`name${i}`),
          score: document.getElementById(`score{i}`),
          lines: document.getElementById(`lines${i}`),
          start: document.getElementById(`start${i}`),
          end: document.getElementById(`end${i}`)
      };
  }

  function validateName(input) {
    if (this.value.length > 8) this.value =  this.value.slice(0, 8);
    this.value = this.value.replace(/[^a-zA-Z0-9,\/()❤️.!?-]/g, '');
  }
  function validateNumber(input, length) {
    if (this.value.length > length) this.value =  this.value.slice(0, length);
    input.value = input.value.replace(/[^0-9]/g, '');
  }
function validateNumberSize(input, size) {
    const v = input.value.slice(0, 3);
    if (parseInt(v) > 255) {
        input.value = input.value.slice(0, 2);
    } else if (this.value > 255) {
        input.value = v;
    }
  }
    const errors = document.getElementById("errors");
    async function onSubmit() {
        const bytes = new Array(4);
        bytes[0] = new Uint8Array([0x37, 0x64, 0x4B, 0xD2]);
        for (const i of [1, 2, 3]) {
            bytes[i] = (new Highscore(packs[i].name.value,
                                     parseInt(packs[i].score.value), 
                                     parseInt(packs[i].lines.value),
                                     parseInt(packs[i].start.value),
                                     parseInt(packs[i].end.value))).toUByteArray()
        }
        const allTogether = concatenate(bytes);
        const buffer = new ArrayBuffer(0x1FFF);
        const array = new Uint8Array(buffer);
        for (let i = 0; i < allTogether.length; i++) {
            array[0xA00 + i] = allTogether[i];
        }
        const file = new BinFile(buffer);
        file.setName("tetris"); file.setExtension("sav"); file.save();
    }
</script>
